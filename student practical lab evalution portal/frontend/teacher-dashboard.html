<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Dashboard - Student Practical Evaluation System</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="dashboard-container">
    <!-- Sidebar -->
    <div class="sidebar">
      <h2>👨‍🏫 Teacher</h2>
      <ul class="sidebar-menu">
        <li><a href="#" class="nav-link active" data-section="labs">🧪 My Labs</a></li>
        <li><a href="#" class="nav-link" data-section="create-lab">➕ Create Lab</a></li>
      </ul>
      <button class="logout-btn" onclick="logout()">🚪 Logout</button>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Header -->
      <div class="header">
        <h1>Teacher Dashboard</h1>
        <div class="user-info">
          <p>Welcome, <strong id="teacherName">Teacher</strong></p>
          <p id="currentTime" style="font-size: 12px; color: #999;"></p>
        </div>
      </div>

      <!-- Alert Box -->
      <div class="alert" id="alertBox"></div>

      <!-- MY LABS SECTION -->
      <section id="labs-section" class="section-content">
        <div class="card">
          <h3>🧪 My Labs</h3>
          <div id="labsList" style="display: grid; gap: 20px;">
            <div style="text-align: center; padding: 40px; color: #999;">
              <p>Loading labs...</p>
            </div>
          </div>
        </div>
      </section>

      <!-- CREATE LAB SECTION -->
      <section id="create-lab-section" class="section-content hidden">
        <div class="card">
          <h3>➕ Create New Lab</h3>
          <p style="color: #666; margin-bottom: 20px;">Create a lab for a specific class. Students will be automatically assigned based on Branch, Year, and Division.</p>
          
          <div class="form-container">
            <form id="createLabForm">
              <div class="form-row">
                <div class="form-group">
                  <label>Lab Name</label>
                  <input type="text" id="labName" placeholder="e.g., Data Structures Lab" required>
                </div>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label>Branch</label>
                  <select id="labBranch" required>
                    <option value="">Select Branch</option>
                    <option value="CSE">CSE</option>
                    <option value="AIML">AIML</option>
                    <option value="AIDS">AIDS</option>
                    <option value="MECH">MECH</option>
                    <option value="ELE">ELE</option>
                    <option value="ENTC">ENTC</option>
                    <option value="TEXT">TEXT</option>
                    <option value="CS">CS</option>
                    <option value="IDS">IDS</option>
                    <option value="Mechanical">Mechanical</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>Year</label>
                  <select id="labYear" required>
                    <option value="">Select Year</option>
                    <option value="1">Year 1</option>
                    <option value="2">Year 2</option>
                    <option value="3">Year 3</option>
                    <option value="4">Year 4</option>
                  </select>
                </div>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label>Division</label>
                  <select id="labDivision" required>
                    <option value="">Select Division</option>
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                  </select>
                </div>
              </div>

              <button type="submit" class="btn btn-primary btn-block">✅ Create Lab</button>
            </form>
          </div>
        </div>
      </section>

      <!-- LAB EVALUATION SECTION -->
      <section id="evaluation-section" class="section-content hidden">
        <div class="card">
          <h3 id="labTitle">Lab Evaluation</h3>
          <p style="margin-bottom: 20px; color: #666;">
            <button class="btn btn-secondary btn-small" onclick="goBackToLabs()">← Back to Labs</button>
            <span style="margin-left: 20px;" id="labInfo"></span>
          </p>

          <div id="evaluationContent">
            <p style="text-align: center; color: #999; padding: 40px;">Loading...</p>
          </div>

          <div style="margin-top: 20px;">
            <button class="btn btn-primary" id="savePracticalBtn">💾 Save All Changes</button>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script src="js/teacher.js"></script>
</body>
</html>
